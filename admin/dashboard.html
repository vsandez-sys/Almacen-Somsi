<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - SOMSI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4 shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">ADMINISTRACIÓN | Almacén SOMSI</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-dark text-white fw-bold">Registro / Edición / Clonación</div>
                    <div class="card-body">
                        <form id="formAlta">
                            <div class="mb-2">
                                <label class="form-label small fw-bold">N° Económico</label>
                                <input type="text" id="adminNumEcon" class="form-control form-control-sm shadow-sm" required>
                            </div>
                            <div class="row mb-2">
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Modelo</label>
                                    <input type="text" id="adminModelo" class="form-control form-control-sm">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-bold">Serie</label>
                                    <input type="text" id="adminSerie" class="form-control form-control-sm">
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold text-uppercase">Categoría</label>
                                <input type="text" id="adminCategoria" class="form-control form-control-sm"
                                    placeholder="Ej: MOTOR, FILTRACIÓN" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold text-uppercase text-primary">Subcategoría (Principal)</label>
                                <input type="text" id="adminSubcat" class="form-control form-control-sm border-primary"
                                    placeholder="Ej: FILTROS ACEITE" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small fw-bold">Pieza / Descripción</label>
                                <input type="text" id="adminPieza" class="form-control form-control-sm" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-7">
                                    <label class="form-label small fw-bold">N° de Parte</label>
                                    <input type="text" id="adminParte" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-5">
                                    <label class="form-label small fw-bold">Dotación (Cant)</label>
                                    <input type="number" id="adminCant" class="form-control form-control-sm" value="1" min="1" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-primary">Vincular a N° Parte Original (Cross Ref)</label>
                                <input type="text" id="adminRefOriginal" class="form-control border-primary form-control-sm"
                                    placeholder="Vacío si es original">
                            </div>

                            <button type="submit" id="btnGuardar" class="btn btn-success w-100 fw-bold shadow-sm">
                                <i class="bi bi-save me-1"></i> GUARDAR EN CATÁLOGO
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <span class="fw-bold text-uppercase">Manual de Partes</span>
                        <div class="d-flex gap-3 align-items-center">
                            <div class="search-container">
                                <div class="input-group input-group-sm" style="width: 250px;">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                                    <input type="text" id="filtroEcon" class="form-control border-start-0" placeholder="Filtrar por unidad...">
                                    <button id="btnClearSearch" class="btn-clear-search" onclick="limpiarBusqueda()">
                                        <i class="bi bi-x-circle-fill"></i>
                                    </button>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-sm fw-bold shadow-sm" data-bs-toggle="modal"
                                data-bs-target="#modalCopiaMasiva">
                                <i class="bi bi-layers-half me-1"></i> COPIAR EQUIPO
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th onclick="alternarOrden()" style="cursor:pointer; user-select:none; width: 15%;" class="text-primary">
                                        UNIDAD <i id="iconOrden" class="bi bi-sort-alpha-down"></i>
                                    </th>
                                    <th style="width: 20%;">CATEGORIZACIÓN</th>
                                    <th style="width: 30%;">PIEZA / DESCRIPCIÓN</th>
                                    <th style="width: 15%;">N° PARTE</th>
                                    <th style="width: 10%;" class="text-center">CANT.</th>
                                    <th style="width: 10%;" class="text-end px-3">ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAdmin">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCopiaMasiva" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title">Copiado Maestro de Inventario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formCopiaMasiva">
                        <label class="small fw-bold mb-1">Equipo Origen (Maestro)</label>
                        <select id="copyOrigen" class="form-select mb-3 shadow-sm" required></select>
                        <hr>
                        <label class="small fw-bold mb-1 text-primary">Económico Destino (Nueva Unidad)</label>
                        <input type="text" id="copyDestEcon" class="form-control mb-3 shadow-sm" placeholder="Ej: EXC-002" required>
                        <div class="row">
                            <div class="col-6">
                                <label class="small fw-bold mb-1">Modelo</label>
                                <input type="text" id="copyDestMod" class="form-control mb-3" required>
                            </div>
                            <div class="col-6">
                                <label class="small fw-bold mb-1">Serie</label>
                                <input type="text" id="copyDestSer" class="form-control mb-3" required>
                            </div>
                        </div>
                        <button type="submit" id="btnEjecutarCopia" class="btn btn-success w-100 mt-2 fw-bold shadow">
                            <i class="bi bi-node-plus me-1"></i> INICIAR CLONACIÓN MASIVA
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
