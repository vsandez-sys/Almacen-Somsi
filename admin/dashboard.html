<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Panel Administrativo - SOMSI</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
   <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="bg-light">
   <nav class="navbar navbar-dark bg-primary mb-4 shadow">
      <div class="container">
         <span class="navbar-brand fw-bold">ADMINISTRACIÓN | Almacén SOMSI</span>
         <button id="btnLogout" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
      </div>
   </nav>

   <div class="container-fluid">
      <div class="row">
         <div class="col-md-4">
            <div class="card shadow-sm border-0 mb-4">
               <div class="card-header bg-dark text-white fw-bold">Registro / Edición / Clonación</div>
               <div class="card-body">
                  <form id="formAlta">
                     <div class="mb-2">
                        <label class="form-label small fw-bold">N° Económico</label>
                        <input type="text" id="adminNumEcon" class="form-control form-control-sm" required>
                     </div>
                     <div class="row mb-2">
                        <div class="col-6">
                           <label class="form-label small fw-bold">Modelo</label>
                           <input type="text" id="adminModelo" class="form-control form-control-sm">
                        </div>
                        <div class="col-6">
                           <label class="form-label small fw-bold">Serie</label>
                           <input type="text" id="adminSerie" class="form-control form-control-sm">
                        </div>
                     </div>
                     <div class="mb-2">
                        <label class="form-label small fw-bold text-uppercase">Categoría</label>
                        <input type="text" id="adminCategoria" class="form-control form-control-sm"
                           placeholder="Ej: MOTOR, FILTRACIÓN, ELÉCTRICO" required>
                     </div>
                     <div class="mb-2">
                        <label class="form-label small fw-bold text-uppercase">Subcategoría</label>
                        <input type="text" id="adminSubcat" class="form-control form-control-sm"
                           placeholder="Ej: SENSORES, FILTROS ACEITE" required>
                     </div>
                     <div class="mb-2">
                        <label class="form-label small fw-bold">Pieza / Descripción</label>
                        <input type="text" id="adminPieza" class="form-control form-control-sm" required>
                     </div>
                     <div class="row mb-3">
                        <div class="col-7">
                           <label class="form-label small fw-bold">N° de Parte</label>
                           <input type="text" id="adminParte" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-5">
                           <label class="form-label small fw-bold">Cant.</label>
                           <input type="number" id="adminCant" class="form-control form-control-sm" value="1" min="1"
                              required>
                        </div>
                     </div>

                     <div class="mb-3">
                        <label class="form-label small fw-bold text-primary">Vincular a N° Parte Original (Cross
                           Ref)</label>
                        <input type="text" id="adminRefOriginal" class="form-control border-primary form-control-sm"
                           placeholder="Vacío si es original">
                     </div>

                     <button type="submit" id="btnGuardar" class="btn btn-success w-100 fw-bold shadow-sm">GUARDAR EN
                        CATÁLOGO</button>
                  </form>
               </div>
            </div>
         </div>

         <div class="col-md-8">
            <div class="card shadow-sm border-0">
               <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                  <span class="fw-bold text-uppercase">Manual de Partes</span>
                  <div class="d-flex gap-2">
                     <button class="btn btn-primary btn-sm fw-bold" data-bs-toggle="modal"
                        data-bs-target="#modalCopiaMasiva">
                        <i class="bi bi-layers-half me-1"></i> COPIAR EQUIPO
                     </button>
                     <div class="input-group input-group-sm" style="width: 200px;">
                        <input type="text" id="filtroEcon" class="form-control" placeholder="Filtrar...">
                     </div>
                  </div>
               </div>
               <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                     <thead class="table-light small">
                        <tr>
                           <th>Unidad</th>
                           <th>Categoría</th>
                           <th>Pieza</th>
                           <th>N° Parte</th>
                           <th>Cant.</th>
                           <th>Acciones</th>
                        </tr>
                     </thead>
                     <tbody id="tablaAdmin" class="small"></tbody>
                  </table>
               </div>
            </div>
         </div>
      </div>
   </div>

   <div class="modal fade" id="modalCopiaMasiva" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
         <div class="modal-content">
            <div class="modal-header bg-dark text-white">
               <h5 class="modal-title">Copiado Maestro</h5><button type="button" class="btn-close btn-close-white"
                  data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
               <form id="formCopiaMasiva">
                  <label class="small fw-bold">Equipo Origen</label>
                  <select id="copyOrigen" class="form-select mb-2" required></select>
                  <hr>
                  <label class="small fw-bold">Económico Destino</label>
                  <input type="text" id="copyDestEcon" class="form-control mb-2" required>
                  <div class="row">
                     <div class="col-6"><label class="small fw-bold">Modelo</label><input type="text" id="copyDestMod"
                           class="form-control mb-2" required></div>
                     <div class="col-6"><label class="small fw-bold">Serie</label><input type="text" id="copyDestSer"
                           class="form-control mb-2" required></div>
                  </div>
                  <button type="submit" id="btnEjecutarCopia" class="btn btn-success w-100 mt-2 fw-bold">COPIAR TODO EL
                     INVENTARIO</button>
               </form>
            </div>
         </div>
      </div>
   </div>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script type="module" src="js/admin.js"></script>
</body>

</html>
