<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo Pro - SOMSI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        /* Ajuste para que el verde Clark resalte en el fondo oscuro */
        .text-primary {
            color: #A1D332 !important;
        }

        .btn-outline-primary {
            color: #A1D332;
            border-color: #A1D332;
        }

        .btn-outline-primary:hover {
            background-color: #A1D332;
            border-color: #A1D332;
            color: #2D2D2D;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow"
        style="background-color: #2D2D2D !important; border-bottom: 3px solid #A1D332;">
        <div class="container">
            <span class="navbar-brand fw-bold italic">
                <i class="bi bi-shield-check me-2 text-primary"></i>SOMSI | <span class="text-primary">CONTROL DE
                    CATÁLOGO</span>
            </span>
            <button id="btnLogout" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
            </button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="card stat-card bg-white p-3 border-start border-4 border-primary">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">UNIDADES</small>
                            <h3 id="statUnidades" class="mb-0 fw-bold">0</h3>
                        </div>
                        <div class="bg-primary bg-opacity-10 p-2 rounded text-primary"><i class="bi bi-truck fs-3"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card bg-white p-3 border-start border-4 border-success">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">REFACCIONES</small>
                            <h3 id="statPiezas" class="mb-0 fw-bold">0</h3>
                        </div>
                        <div class="bg-success bg-opacity-10 p-2 rounded text-success"><i
                                class="bi bi-box-seam fs-3"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card stat-card bg-white p-3 border-start border-4 border-warning">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">CATEGORÍA PREDOMINANTE</small>
                            <h3 id="statTop" class="mb-0 fw-bold text-truncate" style="max-width: 300px;">-</h3>
                        </div>
                        <div class="bg-warning bg-opacity-10 p-2 rounded text-warning"><i
                                class="bi bi-diagram-3 fs-3"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-xl-4">
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white fw-bold py-3 d-flex justify-content-between">
                        <span><i class="bi bi-pencil-square me-2"></i>GESTIÓN DE PIEZA</span>
                        <span id="editBadge" class="badge bg-warning text-dark" style="display:none;">MODO
                            EDICIÓN</span>
                    </div>
                    <div class="card-body p-4">
                        <form id="formAlta">
                            <div class="mb-3">
                                <label class="admin-form-label">N° Económico (Unidad)</label>
                                <input type="text" id="adminNumEcon" class="form-control border-primary fw-bold"
                                    required placeholder="Ej: 335">
                            </div>
                            <div class="row mb-3">
                                <div class="col-6">
                                    <label class="admin-form-label">Modelo</label>
                                    <input type="text" id="adminModelo" class="form-control form-control-sm">
                                </div>
                                <div class="col-6">
                                    <label class="admin-form-label">Serie</label>
                                    <input type="text" id="adminSerie" class="form-control form-control-sm">
                                </div>
                            </div>
                            <hr>
                            <div class="mb-3">
                                <label class="admin-form-label">Categoría Madre</label>
                                <input type="text" id="adminCategoria" list="listaCategorias" class="form-control"
                                    required placeholder="Ej: FILTRACIÓN">
                            </div>
                            <div class="mb-3">
                                <label class="admin-form-label">Subcategoría</label>
                                <input type="text" id="adminSubcat" list="listaSubcategorias" class="form-control"
                                    required placeholder="Ej: ACEITE MOTOR">
                            </div>
                            <div class="mb-3">
                                <label class="admin-form-label">Nombre de la Pieza</label>
                                <input type="text" id="adminPieza" list="listaNombresPiezas"
                                    class="form-control fw-bold" required placeholder="Ej: FILTRO DE ACEITE">
                            </div>

                            <div class="mb-3 p-3 bg-light rounded border-dashed">
                                <label class="admin-form-label text-primary d-block mb-2"><i
                                        class="bi bi-plus-circle-fill me-1"></i> Números de Parte y Conversiones</label>
                                <div id="contenedorPartes">
                                    <div class="input-group input-group-sm mb-2 shadow-sm">
                                        <span class="input-group-text bg-primary text-white fw-bold"
                                            style="width: 85px;">ORIGINAL</span>
                                        <input type="text" class="form-control adminParte" placeholder="Código OEM"
                                            required>
                                        <button class="btn btn-primary" type="button" onclick="agregarCampoParte()"><i
                                                class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-6">
                                    <label class="admin-form-label">Cant. x Unidad</label>
                                    <input type="number" id="adminCant" class="form-control" value="1" min="1">
                                </div>
                            </div>

                            <button type="submit" id="btnGuardar" class="btn btn-success w-100 fw-bold py-2 shadow">
                                <i class="bi bi-cloud-arrow-up-fill me-2"></i>GUARDAR EN CATÁLOGO
                            </button>
                            <button type="button" id="btnCancelarEdit" class="btn btn-link w-100 text-danger mt-2"
                                style="display:none;" onclick="cancelarEdicion()">Cancelar Edición</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-xl-8">
                <div class="card">
                    <div class="card-header bg-white py-3">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="bi bi-search text-muted"></i></span>
                                    <input type="text" id="filtroEcon" class="form-control border-start-0"
                                        placeholder="Buscar por Unidad, Pieza o N° de Parte...">
                                    <button id="btnClearSearch" class="btn btn-white border-start-0"
                                        onclick="limpiarBusqueda()" type="button" style="display:none;"><i
                                            class="bi bi-x-circle text-danger"></i></button>
                                </div>
                            </div>
                            <div class="col-md-6 text-md-end mt-2 mt-md-0">
                                <button class="btn btn-outline-primary btn-sm fw-bold me-1" data-bs-toggle="modal"
                                    data-bs-target="#modalCopiaMasiva"><i class="bi bi-copy me-1"></i> CLONAR
                                    EQUIPO</button>
                                <button class="btn btn-outline-warning btn-sm fw-bold text-dark" data-bs-toggle="modal"
                                    data-bs-target="#modalEdicionMasiva"><i class="bi bi-pencil-fill me-1"></i>
                                    GLOBAL</button>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive" style="max-height: 700px;">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th onclick="alternarOrden()" style="cursor:pointer;">UNIDAD <i id="iconOrden"
                                            class="bi bi-sort-alpha-down"></i></th>
                                    <th>PIEZA / DESCRIPCIÓN</th>
                                    <th>CÓDIGO OEM</th>
                                    <th class="text-center">DOT.</th>
                                    <th class="text-end px-4">ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="tablaAdmin"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>

</html>
