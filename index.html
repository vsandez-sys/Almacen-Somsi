<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somsi - Consulta de Refacciones Clark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">SOMSI <span class="text-white">REFACCIONES</span></a>
            <a href="login.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                <i class="bi bi-person-lock me-1"></i> Admin
            </a>
        </div>
    </nav>

    <div id="heroCarousel" class="carousel slide shadow-sm mb-5" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000" class="d-block w-100 hero-img" alt="Slide 1">
                <div class="carousel-caption d-none d-md-block text-start pb-5">
                    <h1 class="display-4 fw-800 animate-fade-in">MANTÉN TU FLOTA<br><span class="text-primary">EN MOVIMIENTO</span></h1>
                </div>
            </div>
            <div class="carousel-item">
                <img src="TU_IMAGEN_2" class="d-block w-100 hero-img" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="TU_IMAGEN_3" class="d-block w-100 hero-img" alt="Slide 3">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="container buscador-container">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label class="small fw-bold text-muted mb-2 text-uppercase ls-2">Filtrar por Categoría</label>
                                <select id="selectCategoria" class="form-select form-select-lg border-0 bg-light shadow-sm">
                                    <option value="">Todas las Categorías</option>
                                    </select>
                            </div>
                            <div class="col-md-8">
                                <label class="small fw-bold text-muted mb-2 text-uppercase ls-2">Buscador Libre</label>
                                <div class="input-group input-group-lg border rounded-pill overflow-hidden shadow-sm bg-white">
                                    <input type="text" id="filtroEcon" class="form-control border-0 py-3" placeholder="Escribe N° Económico, Pieza o N° de Parte...">
                                    <button class="btn btn-primary px-4 fw-bold" id="btnBuscar">
                                        <i class="bi bi-search me-2"></i>BUSCAR
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-5" id="resultadosSeccion" style="display: none;">
        <div class="d-flex align-items-center mb-4">
            <h4 class="fw-bold mb-0 text-dark">Resultados del Catálogo</h4>
            <hr class="flex-grow-1 ms-3 opacity-25">
        </div>

        <div class="table-responsive shadow-sm rounded-4 bg-white mb-5 border">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Subcategoría</th>
                        <th>Descripción de Pieza</th>
                        <th>N° de Parte (OEM)</th>
                        <th class="text-center pe-4">Stock</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados" class="align-middle"></tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5 text-center">
        <div class="container">
            <h5 class="fw-bold text-primary">SOMSI</h5>
            <p class="small text-muted">© 2026 Soluciones en Montacargas y Servicios Industriales.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
